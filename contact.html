<style>

    nav {
        background-color: black;
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 20px 50px;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        box-sizing: border-box;
    }
    .logo {
        color: #c49b63;
        font-size: 22px;
        font-weight: bold;
    }
    nav ul {
        list-style: none;
        display: flex;
        gap: 30px;
        margin: 0;
        padding: 0;
    }
    nav ul li {
        margin-left: 25px;
    }
    nav ul li a {
       text-decoration: none; 
       color: #c49b63;
       font-size: 18px;
       transition: color 0.3 ease;
       position: relative;
       padding-bottom: 5px;
       display: inline-block;
    }
    nav ul li a::after {
        content: "";
        position: absolute;
        left: 0;
        bottom: 0;
        width: 0;
        height: 2px;
        background-color: #c49b63;
        transition: width 0.3s ease;
    }
    nav ul li a:hover {
        color: #c49b63;
    }
    nav ul li a:hover::after {
        width: 100%;
    }
    .contact {
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 85vh;
        padding: 50px;
        letter-spacing: 2px;

        margin-bottom: 20px;

    .social-links li {

    }
    .social-links a {
        text-decoration: none;
        color: black;
        display: flex;
        align-items: center;
        gap: 10px;
        font-size: 2rem;
    }
    h1 {
        font-size: 4rem;
        margin-bottom: 0;
    }
